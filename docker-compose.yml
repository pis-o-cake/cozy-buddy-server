# 보조 서비스 스택 (설계서 §13-1 — GPU 스택은 Windows 네이티브, 보조 서비스만 컨테이너)
services:
  postgres:
    image: postgres:16
    container_name: cozy-postgres
    environment:
      POSTGRES_USER: cozy
      POSTGRES_PASSWORD: cozy
      POSTGRES_DB: cozy
    ports:
      - "5432:5432"
    volumes:
      - cozy-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # matterjs-server (Phase 2 — 설계서 §8-1):
  # mDNS/IPv6 요건상 Linux host network 필요 → WSL2에서 구동.
  # matterjs:
  #   image: ghcr.io/matter-js/matterjs-server
  #   network_mode: host
  #   restart: unless-stopped

volumes:
  cozy-pgdata:
