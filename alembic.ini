[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# URL is injected in alembic/env.py (DATABASE_URL or ALEMBIC_DATABASE_URL).
# NOTE: keep this file ASCII-only; configparser reads it with the locale encoding.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
